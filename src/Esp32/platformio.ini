; ============================================================
; RNA Therapy Platform — Multi-ESP32 Lab System
; ============================================================
;
; 4 ESP32-S3 boards ($4 each = $16 total):
;
;   #1 Controller    — WiFi + WebSocket + heat/spectro/centrifuge/gel
;   #2 Stepper       — I2C slave, dedicated syringe pump timing
;   #3 Environment   — WiFi + WebSocket + pH/stirrer/vortex/UV-C/safety
;   #4 QC & Imaging  — WiFi + WebSocket + camera/DLS/turbidity
;
; Build & upload:
;   pio run -e controller -t upload     # ESP32 #1
;   pio run -e stepper -t upload        # ESP32 #2
;   pio run -e environment -t upload    # ESP32 #3
;   pio run -e qc-imaging -t upload     # ESP32 #4
;
; Each board needs its own USB connection for upload.
; After upload, all communicate via WiFi (except #2 which uses I2C).

[platformio]
default_envs = controller

; Common settings
[common]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; ===== ESP32 #1 — Controller =====
; Heat block, UV spectrophotometer, centrifuge, gel electrophoresis
; WebSocket server on port 9123
[env:controller]
extends = common
build_src_filter = +<main.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7
    milesburton/DallasTemperature@^3.11
    paulstoffregen/OneWire@^2.3
    links2004/WebSockets@^2.4

; ===== ESP32 #2 — Stepper Slave =====
; 2x syringe pump stepper motors, I2C slave (no WiFi)
; Dedicated to step timing precision
[env:stepper]
extends = common
build_src_filter = +<stepper_slave.cpp>

; ===== ESP32 #3 — Environment & Safety =====
; Room/freezer/fridge temp, pH meter, stirrer, vortex, UV-C, fume hood, E-stop, gas
; WebSocket server on port 9124
[env:environment]
extends = common
build_src_filter = +<env_controller.cpp>
lib_deps =
    bblanchon/ArduinoJson@^7
    milesburton/DallasTemperature@^3.11
    paulstoffregen/OneWire@^2.3
    links2004/WebSockets@^2.4
    adafruit/DHT sensor library@^1.4
    adafruit/Adafruit Unified Sensor@^1.1

; ===== ESP32 #4 — QC & Imaging =====
; Gel imager (camera + transilluminator), DLS particle sizer, turbidity sensor
; WebSocket server on port 9125
[env:qc-imaging]
extends = common
build_src_filter = +<qc_imaging.cpp>
board_build.partitions = huge_app.csv
build_flags =
    ${common.build_flags}
    -DBOARD_HAS_PSRAM=1
lib_deps =
    bblanchon/ArduinoJson@^7
    links2004/WebSockets@^2.4
    madhephaestus/ESP32Servo@^3
